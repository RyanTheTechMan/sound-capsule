name: build-and-test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install helper dependencies
        run: python -m pip install ./helper
      - name: Test helper
        shell: bash
        run: PYTHONPATH=helper python -m unittest discover -s helper/tests -v
      - name: Build self-contained helper
        shell: bash
        run: |
          python -m pip install PyInstaller==6.21.0
          if [ "${{ runner.os }}" = "macOS" ]; then
            python scripts/build_frozen_helper.py \
              --output build/frozen-helper --target-architecture universal2
          else
            python scripts/build_frozen_helper.py --output build/frozen-helper
          fi
      - name: Configure VST3
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSOUNDCAPSULE_UNIVERSAL_MACOS=OFF -DSOUNDCAPSULE_BUILD_PLUGIN=ON
      - name: Build VST3
        run: cmake --build build --config Release --parallel 4
      - name: Test preview and FL version behavior
        run: ctest --test-dir build -C Release --output-on-failure

  windows-installer:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate Windows installer source
        shell: powershell
        run: '[void][xml](Get-Content -Raw packaging/windows/Package.wxs)'
      - name: Stage installer test artifacts
        shell: powershell
        run: |
          $standalone = "build/plugin/SoundCapsule_artefacts/Release/Standalone"
          $vst = "build/plugin/SoundCapsule_artefacts/Release/VST3/Sound Capsule.vst3/Contents/x86_64-win"
          New-Item -ItemType Directory -Force $standalone, $vst | Out-Null
          $appFile = Join-Path $standalone "Sound Capsule.exe"
          $vstFile = Join-Path $vst "Sound Capsule.vst3"
          New-Item -ItemType File -Force $appFile, $vstFile | Out-Null
          if (-not (Test-Path $appFile) -or -not (Test-Path $vstFile)) {
            throw "Could not stage installer test artifacts"
          }
      - name: Build self-contained helper
        shell: bash
        run: |
          python -m pip install PyInstaller==6.21.0
          python scripts/build_frozen_helper.py --output build/frozen-helper
      - name: Build Windows MSI
        shell: bash
        run: |
          VERSION=$(PYTHONPATH=helper python -c 'import soundcapsule; print(soundcapsule.__version__)')
          python scripts/package_windows_installer.py \
            --build build --output dist --version "$VERSION"
