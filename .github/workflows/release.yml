name: Build draft release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (for example, 0.1.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: sound-capsule-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate version and prepare notes
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          PROJECT_VERSION=$(PYTHONPATH=helper python -c 'import soundcapsule; print(soundcapsule.__version__)')
          if [[ ! "$REQUESTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use semantic versioning, for example 1.2.3." >&2
            exit 1
          fi
          if [[ "$REQUESTED_VERSION" != "$PROJECT_VERSION" ]]; then
            echo "Requested version $REQUESTED_VERSION does not match project version $PROJECT_VERSION." >&2
            exit 1
          fi
          python scripts/release_notes.py "$REQUESTED_VERSION" --output release-notes.md
          echo "value=$REQUESTED_VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build:
    name: Build ${{ matrix.label }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            label: macOS universal
          - os: windows-2022
            platform: windows
            label: Windows x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate macOS signing configuration
        if: matrix.platform == 'macos'
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_BASE64 }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          for variable in \
            MACOS_CERTIFICATE_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_INSTALLER_CERTIFICATE_BASE64 \
            MACOS_INSTALLER_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_TEAM_ID; do
            if [ -z "${!variable:-}" ]; then
              missing+=("$variable")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'Missing required GitHub Actions secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Test helper
        shell: bash
        run: PYTHONPATH=helper python -m unittest discover -s helper/tests -v

      - name: Configure app and VST3
        shell: bash
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DSOUNDCAPSULE_BUILD_PLUGIN=ON
          -DSOUNDCAPSULE_RELEASE_REPOSITORY=${{ github.repository }}
          -DSOUNDCAPSULE_APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}

      - name: Build app and VST3
        run: cmake --build build --config Release --parallel 4

      - name: Install frozen-helper builder
        run: python -m pip install PyInstaller==6.21.0

      - name: Build Windows frozen helper
        if: matrix.platform == 'windows'
        run: python scripts/build_frozen_helper.py --output build/frozen-helper

      - name: Build and sign macOS app, VST3, and frozen helper
        if: matrix.platform == 'macos'
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_BASE64 }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_PATH="build/plugin/SoundCapsule_artefacts/Release/Standalone/Sound Capsule.app"
          VST3_PATH="build/plugin/SoundCapsule_artefacts/Release/VST3/Sound Capsule.vst3"
          HELPER_PATH="build/frozen-helper/Sound Capsule Helper"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          INSTALLER_CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-installer.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          test -d "$APP_PATH"
          test -d "$VST3_PATH"
          printf '%s' "$MACOS_CERTIFICATE_BASE64" \
            | base64 --decode -o "$CERTIFICATE_PATH"
          printf '%s' "$MACOS_INSTALLER_CERTIFICATE_BASE64" \
            | base64 --decode -o "$INSTALLER_CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security import "$INSTALLER_CERTIFICATE_PATH" \
            -P "$MACOS_INSTALLER_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          IDENTITY_LINE=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep 'Developer ID Application' | head -1 || true)
          test -n "$IDENTITY_LINE" || {
            echo 'The P12 does not contain a usable Developer ID Application identity.' >&2
            exit 1
          }
          case "$IDENTITY_LINE" in
            *"($APPLE_TEAM_ID)"*) ;;
            *)
              echo 'The Developer ID certificate does not match APPLE_TEAM_ID.' >&2
              exit 1
              ;;
          esac
          IDENTITY_HASH=$(printf '%s\n' "$IDENTITY_LINE" | awk '{print $2}')
          python scripts/build_frozen_helper.py \
            --output build/frozen-helper \
            --target-architecture universal2 \
            --codesign-identity "$IDENTITY_HASH"
          INSTALLER_IDENTITY_LINE=$(security find-identity -v "$KEYCHAIN_PATH" \
            | grep 'Developer ID Installer' | head -1 || true)
          test -n "$INSTALLER_IDENTITY_LINE" || {
            echo 'The installer P12 does not contain a usable Developer ID Installer identity.' >&2
            exit 1
          }
          case "$INSTALLER_IDENTITY_LINE" in
            *"($APPLE_TEAM_ID)"*) ;;
            *)
              echo 'The Developer ID Installer certificate does not match APPLE_TEAM_ID.' >&2
              exit 1
              ;;
          esac

          codesign --force --deep \
            --sign "$IDENTITY_HASH" \
            --timestamp \
            --options runtime \
            "$VST3_PATH"
          codesign --force --deep \
            --sign "$IDENTITY_HASH" \
            --timestamp \
            --options runtime \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$VST3_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --verify --strict --verbose=2 "$HELPER_PATH/Sound Capsule Helper"
          lipo -archs "$HELPER_PATH/Sound Capsule Helper" | grep -q 'x86_64 arm64\|arm64 x86_64'

      - name: Notarize and staple macOS app and VST3
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_PATH="build/plugin/SoundCapsule_artefacts/Release/Standalone/Sound Capsule.app"
          VST3_PATH="build/plugin/SoundCapsule_artefacts/Release/VST3/Sound Capsule.vst3"
          HELPER_PATH="build/frozen-helper/Sound Capsule Helper"
          NOTARY_STAGING="$RUNNER_TEMP/sound-capsule-notary"
          NOTARY_ZIP="$RUNNER_TEMP/sound-capsule-notary.zip"
          RESULT_FILE="$RUNNER_TEMP/notary-result.json"
          LOG_FILE="$RUNNER_TEMP/notary-log.json"

          mkdir -p "$NOTARY_STAGING"
          ditto "$APP_PATH" "$NOTARY_STAGING/Sound Capsule.app"
          ditto "$VST3_PATH" "$NOTARY_STAGING/Sound Capsule.vst3"
          ditto "$HELPER_PATH" "$NOTARY_STAGING/Sound Capsule Helper"
          ditto -c -k --keepParent "$NOTARY_STAGING" "$NOTARY_ZIP"

          set +e
          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json > "$RESULT_FILE"
          submit_exit=$?
          set -e

          cat "$RESULT_FILE"
          SUBMISSION_ID=$(jq -r '.id // empty' "$RESULT_FILE" 2>/dev/null || true)
          NOTARY_STATUS=$(jq -r '.status // empty' "$RESULT_FILE" 2>/dev/null || true)
          if [ -n "$SUBMISSION_ID" ]; then
            xcrun notarytool log "$SUBMISSION_ID" "$LOG_FILE" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            if [ -f "$LOG_FILE" ]; then
              cat "$LOG_FILE"
            fi
          fi
          if [ "$submit_exit" -ne 0 ] || [ "$NOTARY_STATUS" != 'Accepted' ]; then
            echo "Apple notarization failed with status: ${NOTARY_STATUS:-unknown}" >&2
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler staple "$VST3_PATH"
          xcrun stapler validate "$VST3_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$VST3_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --verify --strict --verbose=2 "$HELPER_PATH/Sound Capsule Helper"

      - name: Package release
        shell: bash
        run: >-
          python scripts/package_release.py
          --build build
          --output dist
          --platform ${{ matrix.platform }}
          --version ${{ needs.validate.outputs.version }}

      - name: Build signed macOS installer
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          INSTALLER_IDENTITY_LINE=$(security find-identity -v "$KEYCHAIN_PATH" \
            | grep 'Developer ID Installer' | head -1)
          INSTALLER_IDENTITY=$(printf '%s\n' "$INSTALLER_IDENTITY_LINE" | sed -E 's/.*"(.*)".*/\1/')
          MACOS_INSTALLER_IDENTITY="$INSTALLER_IDENTITY" \
          MACOS_INSTALLER_KEYCHAIN="$KEYCHAIN_PATH" \
            python scripts/package_macos_installer.py \
              --build build --output dist --version "${{ needs.validate.outputs.version }}"

      - name: Notarize and staple macOS installer
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          PKG_PATH="dist/Sound-Capsule-v${{ needs.validate.outputs.version }}-macOS.pkg"
          RESULT_FILE="$RUNNER_TEMP/pkg-notary-result.json"
          xcrun notarytool submit "$PKG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --output-format json > "$RESULT_FILE"
          cat "$RESULT_FILE"
          test "$(jq -r '.status // empty' "$RESULT_FILE")" = 'Accepted'
          xcrun stapler staple "$PKG_PATH"
          xcrun stapler validate "$PKG_PATH"
          pkgutil --check-signature "$PKG_PATH"
          spctl --assess --type install --verbose=4 "$PKG_PATH"

      - name: Build Windows MSI
        if: matrix.platform == 'windows'
        shell: bash
        run: >-
          python scripts/package_windows_installer.py
          --build build
          --output dist
          --version ${{ needs.validate.outputs.version }}

      - uses: actions/upload-artifact@v7
        with:
          name: sound-capsule-${{ matrix.platform }}
          path: |
            dist/*.zip
            dist/*.pkg
            dist/*.msi
          if-no-files-found: error
          compression-level: 0

      - name: Clean up macOS signing material
        if: always() && matrix.platform == 'macos'
        shell: bash
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/developer-id-application.p12"
          rm -f "$RUNNER_TEMP/developer-id-installer.p12"

  draft:
    name: Create draft release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: sound-capsule-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: notes

      - name: Create checksums
        working-directory: dist
        run: sha256sum *.zip *.pkg *.msi > SHA256SUMS.txt

      - name: Create GitHub draft
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          gh release create "v$VERSION" \
            dist/*.zip dist/*.pkg dist/*.msi dist/SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --target "$SOURCE_SHA" \
            --title "Sound Capsule v$VERSION" \
            --notes-file notes/release-notes.md \
            --draft
