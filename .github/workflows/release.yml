name: Build draft release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (for example, 0.1.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: sound-capsule-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate version and prepare notes
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          PROJECT_VERSION=$(PYTHONPATH=helper python -c 'import soundcapsule; print(soundcapsule.__version__)')
          if [[ ! "$REQUESTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use semantic versioning, for example 1.2.3." >&2
            exit 1
          fi
          if [[ "$REQUESTED_VERSION" != "$PROJECT_VERSION" ]]; then
            echo "Requested version $REQUESTED_VERSION does not match project version $PROJECT_VERSION." >&2
            exit 1
          fi
          python scripts/release_notes.py "$REQUESTED_VERSION" --output release-notes.md
          echo "value=$REQUESTED_VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build:
    name: Build ${{ matrix.label }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            label: macOS universal
          - os: windows-2022
            platform: windows
            label: Windows x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test helper
        shell: bash
        run: PYTHONPATH=helper python -m unittest discover -s helper/tests -v

      - name: Configure app and VST3
        shell: bash
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DSOUNDCAPSULE_BUILD_PLUGIN=ON
          -DSOUNDCAPSULE_RELEASE_REPOSITORY=${{ github.repository }}

      - name: Build app and VST3
        run: cmake --build build --config Release --parallel 4

      - name: Package release
        shell: bash
        run: >-
          python scripts/package_release.py
          --build build
          --output dist
          --platform ${{ matrix.platform }}
          --version ${{ needs.validate.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: sound-capsule-${{ matrix.platform }}
          path: dist/*.zip
          if-no-files-found: error
          compression-level: 0

  draft:
    name: Create draft release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: sound-capsule-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: notes

      - name: Create checksums
        working-directory: dist
        run: sha256sum *.zip > SHA256SUMS.txt

      - name: Create GitHub draft
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          gh release create "v$VERSION" \
            dist/*.zip dist/SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --target "$SOURCE_SHA" \
            --title "Sound Capsule v$VERSION" \
            --notes-file notes/release-notes.md \
            --draft
